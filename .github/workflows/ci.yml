name: CI

on:
  push:
  pull_request:

jobs:
  bridge-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python sources
        run: python3 -m compileall -q bridge/src tests

      - name: Run unit tests
        run: PYTHONPATH=bridge/src python3 -m unittest discover -s tests
