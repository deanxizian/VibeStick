name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  bridge-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile Python sources
        run: python3 -m compileall -q bridge/src tests

      - name: Run unit tests
        run: PYTHONPATH=bridge/src python3 -m unittest discover -s tests

  shell-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Check POSIX shell syntax
        run: |
          for file in scripts/*.sh; do
            sh -n "$file"
          done

      - name: Check Bash parse compatibility
        run: |
          for file in scripts/*.sh script/*.sh; do
            bash -n "$file"
          done

  macos-helper-build:
    runs-on: macos-14
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Type-check HUD helper
        run: xcrun swiftc -typecheck app/macos/VibeStickHUD/main.swift -framework AppKit -framework QuartzCore

      - name: Type-check microphone helper
        run: xcrun swiftc -typecheck bridge/tools/vibe_stick_mic_recorder.swift -framework AVFoundation

      - name: Build macOS setup app
        run: swift build --package-path app/macos

      - name: Test macOS setup app
        run: swift test --package-path app/macos

      - name: Check scripts with macOS sh
        run: |
          for file in scripts/*.sh; do
            sh -n "$file"
          done

  firmware-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container: espressif/idf:v5.5.1

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Build StickS3 firmware with ESP-IDF 5.5.1
        working-directory: firmware/sticks3
        # GitHub Actions replaces the image entrypoint with `tail`, so invoke
        # ESP-IDF's entrypoint explicitly to populate PATH and Python tooling.
        run: /opt/esp/entrypoint.sh idf.py build
