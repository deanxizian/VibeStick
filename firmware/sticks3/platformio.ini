[platformio]
src_dir = src
include_dir = include

[env:sticks3]
; Canonical release/CI builds use native ESP-IDF v5.5.1. Pin the optional
; PlatformIO entry point to its matching 5.5-series platform for repeatability.
platform = espressif32@6.12.0
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200
board_build.flash_size = 8MB
board_upload.flash_size = 8MB
